# ============================================================================
# LOCAL DEVELOPMENT: defaults below are for convenience only.
# PRODUCTION: override every variable marked "DEV ONLY" in a .env file.
#
# Required env vars for production (no safe defaults):
#   SECRET_KEY=<random 64-char hex>
#   JWT_SECRET_KEY=<random 64-char hex>
#   ENCRYPTION_KEY=<valid Fernet key>
#   POSTGRES_PASSWORD=<strong password>
#   MINIO_ROOT_PASSWORD=<strong password>
#   LANGFUSE_ENCRYPTION_KEY=<64 hex chars — must NOT be all zeros>
#   LANGFUSE_NEXTAUTH_SECRET=<random secret>
#   LANGFUSE_SALT=<random salt>
#   LANGFUSE_REDIS_PASSWORD=<strong password>
# ============================================================================

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg14
    container_name: synkora-postgres
    command: postgres -c max_connections=300
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synkora}
      POSTGRES_USER: ${POSTGRES_USER:-synkora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synkora}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synkora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synkora-network

  # PostgreSQL Test Database
  postgres-test:
    image: pgvector/pgvector:pg14
    container_name: synkora-postgres-test
    environment:
      POSTGRES_DB: synkora_test
      POSTGRES_USER: ${POSTGRES_USER:-synkora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synkora}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5439:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synkora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synkora-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: synkora-redis
    # Production-ready Redis config:
    # - 2GB memory limit (adjust for production)
    # - allkeys-lfu: Least Frequently Used eviction (better than LRU for caches)
    # - lazyfree: Background memory cleanup to avoid blocking
    command: >
      sh -c "redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lfu
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --tcp-keepalive 300
      --timeout 0
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    ports:
      # DEV ONLY: remove or restrict this port binding in production
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synkora-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: synkora-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    networks:
      - synkora-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    platform: linux/amd64
    container_name: synkora-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - xpack.ml.enabled=false
      - xpack.watcher.enabled=false
      - xpack.graph.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=false
    mem_limit: 2g
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - synkora-network

  # Langfuse PostgreSQL Database
  langfuse-postgres:
    image: postgres:17-alpine
    container_name: synkora-langfuse-postgres
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse  # DEV ONLY - CHANGE IN PRODUCTION
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5440:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - synkora-network

  # Langfuse ClickHouse Database
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: synkora-langfuse-clickhouse
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: langfuse_clickhouse  # DEV ONLY - CHANGE IN PRODUCTION
      CLICKHOUSE_PASSWORD: langfuse_clickhouse  # DEV ONLY - CHANGE IN PRODUCTION
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    networks:
      - synkora-network

  # Langfuse Redis (separate from main Redis)
  langfuse-redis:
    image: redis:7-alpine
    container_name: synkora-langfuse-redis
    command: redis-server --requirepass ${LANGFUSE_REDIS_PASSWORD:-langfuse_redis_dev}
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - synkora-network

  # Langfuse Worker
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: synkora-langfuse-worker
    restart: always
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3030:3030"
    environment:
      - NEXTAUTH_URL=http://localhost:3001
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse  # DEV ONLY - CHANGE IN PRODUCTION
      - SALT=${LANGFUSE_SALT:-langfuse_dev_salt}  # DEV ONLY - set LANGFUSE_SALT in production
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY:-deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef}  # DEV ONLY - set LANGFUSE_ENCRYPTION_KEY in production
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - CLICKHOUSE_MIGRATION_URL=clickhouse://langfuse_clickhouse:langfuse_clickhouse@langfuse-clickhouse:9000  # DEV ONLY
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_USER=langfuse_clickhouse  # DEV ONLY - CHANGE IN PRODUCTION
      - CLICKHOUSE_PASSWORD=langfuse_clickhouse  # DEV ONLY - CHANGE IN PRODUCTION
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${LANGFUSE_REDIS_PASSWORD:-langfuse_redis_dev}  # DEV ONLY - set LANGFUSE_REDIS_PASSWORD in production
    networks:
      - synkora-network

  # Langfuse Web UI
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: synkora-langfuse-web
    restart: always
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-langfuse_dev_secret_change_in_prod}  # DEV ONLY - set LANGFUSE_NEXTAUTH_SECRET in production
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse  # DEV ONLY - CHANGE IN PRODUCTION
      - SALT=${LANGFUSE_SALT:-langfuse_dev_salt}  # DEV ONLY - set LANGFUSE_SALT in production
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY:-deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef}  # DEV ONLY - set LANGFUSE_ENCRYPTION_KEY in production
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - CLICKHOUSE_MIGRATION_URL=clickhouse://langfuse_clickhouse:langfuse_clickhouse@langfuse-clickhouse:9000  # DEV ONLY
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_USER=langfuse_clickhouse  # DEV ONLY - CHANGE IN PRODUCTION
      - CLICKHOUSE_PASSWORD=langfuse_clickhouse  # DEV ONLY - CHANGE IN PRODUCTION
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${LANGFUSE_REDIS_PASSWORD:-langfuse_redis_dev}  # DEV ONLY - set LANGFUSE_REDIS_PASSWORD in production
    networks:
      - synkora-network

  # MinIO S3-Compatible Storage
  minio:
    image: minio/minio:latest
    container_name: synkora-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}           # DEV ONLY default
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}   # DEV ONLY — change in production
      MINIO_SERVER_URL: "http://localhost:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - synkora-network

  # MinIO Client - Create buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: synkora-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/synkora-storage --ignore-existing;
      /usr/bin/mc mb myminio/langfuse --ignore-existing;
      exit 0;
      "
    networks:
      - synkora-network

  # ML Microservice (sentence-transformers + FAISS)
  # Internal only — reachable within the Docker network as http://synkora-ml:5002
  synkora-ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: synkora-ml
    networks:
      - synkora-network

  # Scraper Microservice (Playwright browser + crawl4ai)
  # Internal only — reachable within the Docker network as http://synkora-scraper:5003
  synkora-scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: synkora-scraper
    networks:
      - synkora-network

  # Sandbox Microservice (agent code execution)
  # Internal only — reachable within the Docker network as http://synkora-sandbox:5004
  synkora-sandbox:
    build:
      context: ./services/sandbox
      dockerfile: Dockerfile
    container_name: synkora-sandbox
    environment:
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
    networks:
      - synkora-network

  # ---------------------------------------------------------------------------
  # PgBouncer — connection pooler in front of PostgreSQL.
  # Mirrors the production K8s setup (pgbouncer-deployment.yml).
  #
  # LOCAL TESTING:
  #   Set DB_HOST=pgbouncer and PGBOUNCER_ENABLED=true in api/.env, then:
  #     docker-compose --profile pgbouncer up -d
  #
  #   Verify pooling (PGBOUNCER_PORT=5432 overrides bitnami default of 6432):
  #     docker-compose exec pgbouncer psql -p 5432 -U pgbouncer pgbouncer -c "SHOW POOLS;"
  #
  # Default (no profile): api connects directly to postgres (simpler local dev).
  # ---------------------------------------------------------------------------
  # edoburu/pgbouncer used for local dev — supports env var config without a config file.
  # Production K8s uses bitnami/pgbouncer:1 (see k8s/application/pgbouncer-deployment.yml).
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: synkora-pgbouncer
    profiles:
      - pgbouncer
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-synkora}
      - DB_USER=${POSTGRES_USER:-synkora}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-synkora}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=10
      - RESERVE_POOL_SIZE=5
      # DISCARD TEMP only — DISCARD ALL runs RESET ALL which clears statement_timeout.
      - SERVER_RESET_QUERY=DISCARD TEMP
      - SERVER_IDLE_TIMEOUT=600
      - AUTH_TYPE=md5
      - LISTEN_PORT=5432
    ports:
      - "127.0.0.1:5432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-synkora}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - synkora-network

  # API Service
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: synkora-api
    env_file:
      - ./api/.env
    environment:
      # DB_HOST and PGBOUNCER_ENABLED are read from api/.env (env_file above).
      # Override here only if you need to switch without editing .env:
      #   DB_HOST=pgbouncer PGBOUNCER_ENABLED=true docker-compose --profile pgbouncer up
      - PYTHONUNBUFFERED=1
      - ML_SERVICE_URL=http://synkora-ml:5002
      - SCRAPER_SERVICE_URL=http://synkora-scraper:5003
      - SANDBOX_SERVICE_URL=http://synkora-sandbox:5004
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
      # Workspace Settings (uses /tmp which is already writable)
      - WORKSPACE_BASE_PATH=/tmp/synkora/workspaces

      - WORKSPACE_TTL_HOURS=24
      - WORKSPACE_MAX_SIZE_MB=2000
    volumes:
      - ./api:/app/api
      - /app/api/.venv
      # Mount SSH keys from host machine for git operations
      - ${HOME}/.ssh:/root/.ssh:ro
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      synkora-ml:
        condition: service_started
      synkora-scraper:
        condition: service_started
      synkora-sandbox:
        condition: service_started
    networks:
      - synkora-network

  # ---------------------------------------------------------------------------
  # Celery Workers — split queues to mirror K8s deployments.
  # Each worker handles one queue group to verify task routing locally before
  # deploying the K8s split (celery-worker-*-deployment.yml).
  #
  # Verify routing:
  #   docker-compose exec celery-worker-agents celery -A src.celery_app inspect active
  #   docker-compose exec celery-worker-notifications celery -A src.celery_app inspect active
  # ---------------------------------------------------------------------------

  # Default queue — general tasks, beat-dispatched jobs, cleanup tasks.
  celery-worker:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: synkora-celery-worker
    command: celery -A src.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4} -Q default
    env_file:
      - ./api/.env
    environment:
      - PYTHONUNBUFFERED=1
      - CELERY_CONCURRENCY=${CELERY_CONCURRENCY:-4}
      - ML_SERVICE_URL=http://synkora-ml:5002
      - SCRAPER_SERVICE_URL=http://synkora-scraper:5003
      - SANDBOX_SERVICE_URL=http://synkora-sandbox:5004
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
      - WORKSPACE_BASE_PATH=/tmp/synkora/workspaces

      - WORKSPACE_TTL_HOURS=24
      - WORKSPACE_MAX_SIZE_MB=2000
    volumes:
      - ./api:/app/api
      - /app/api/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synkora-network

  # Agents queue — autonomous agent execution (tasks.execute_scheduled_task,
  # execute_spawn_agent_task, process_webhook_event). Memory-intensive, long-running.
  celery-worker-agents:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: synkora-celery-worker-agents
    command: celery -A src.celery_app worker --loglevel=info --concurrency=${CELERY_AGENTS_CONCURRENCY:-6} -Q agents
    env_file:
      - ./api/.env
    environment:
      - PYTHONUNBUFFERED=1
      - ML_SERVICE_URL=http://synkora-ml:5002
      - SCRAPER_SERVICE_URL=http://synkora-scraper:5003
      - SANDBOX_SERVICE_URL=http://synkora-sandbox:5004
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
      - WORKSPACE_BASE_PATH=/tmp/synkora/workspaces

      - WORKSPACE_TTL_HOURS=24
      - WORKSPACE_MAX_SIZE_MB=2000
    volumes:
      - ./api:/app/api
      - /app/api/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synkora-network

  # Notifications queue — email + in-app + Slack/Teams/WhatsApp notifications.
  # I/O-bound, short-lived tasks; high concurrency, low memory.
  celery-worker-notifications:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: synkora-celery-worker-notifications
    command: celery -A src.celery_app worker --loglevel=info --concurrency=8 -Q email,notifications
    env_file:
      - ./api/.env
    environment:
      - PYTHONUNBUFFERED=1
      - ML_SERVICE_URL=http://synkora-ml:5002
      - SCRAPER_SERVICE_URL=http://synkora-scraper:5003
      - SANDBOX_SERVICE_URL=http://synkora-sandbox:5004
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
      - WORKSPACE_BASE_PATH=/tmp/synkora/workspaces

      - WORKSPACE_TTL_HOURS=24
      - WORKSPACE_MAX_SIZE_MB=2000
    volumes:
      - ./api:/app/api
      - /app/api/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synkora-network

  # Celery Worker - Billing queue (dedicated for critical billing tasks)
  celery-worker-billing:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: synkora-celery-worker-billing
    command: celery -A src.celery_app worker --loglevel=info --concurrency=2 -Q billing
    env_file:
      - ./api/.env
    environment:
      - PYTHONUNBUFFERED=1
      - ML_SERVICE_URL=http://synkora-ml:5002
      - SCRAPER_SERVICE_URL=http://synkora-scraper:5003
      - SANDBOX_SERVICE_URL=http://synkora-sandbox:5004
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
      - WORKSPACE_BASE_PATH=/tmp/synkora/workspaces

      - WORKSPACE_TTL_HOURS=24
      - WORKSPACE_MAX_SIZE_MB=2000
    volumes:
      - ./api:/app/api
      - /app/api/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synkora-network

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: synkora-celery-beat
    command: celery -A src.celery_app beat --loglevel=info
    env_file:
      - ./api/.env
    environment:
      - PYTHONUNBUFFERED=1
      - ML_SERVICE_URL=http://synkora-ml:5002
      - SCRAPER_SERVICE_URL=http://synkora-scraper:5003
      - SANDBOX_SERVICE_URL=http://synkora-sandbox:5004
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
      - WORKSPACE_BASE_PATH=/tmp/synkora/workspaces

      - WORKSPACE_TTL_HOURS=24
      - WORKSPACE_MAX_SIZE_MB=2000
    volumes:
      - ./api:/app/api
      - /app/api/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synkora-network

  # Bot Worker - Manages Slack/Telegram bot connections at scale
  bot-worker:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: synkora-bot-worker
    command: python -m src.bot_worker.main
    env_file:
      - ./api/.env
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - PGBOUNCER_ENABLED=${PGBOUNCER_ENABLED:-false}
      - PYTHONUNBUFFERED=1
      - ML_SERVICE_URL=http://synkora-ml:5002
      - SCRAPER_SERVICE_URL=http://synkora-scraper:5003
      - BOT_WORKER_CAPACITY=1000
      - BOT_WORKER_HEALTH_PORT=8080
    volumes:
      - ./api:/app/api
      - /app/api/.venv
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - synkora-network

  # Web Frontend Service
  # web:
  #   build:
  #     context: ./web
