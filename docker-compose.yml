  # Documentation Site
  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile.dev
    container_name: synkora-docs
    volumes:
      - ./docs:/app
      - docs_node_modules:/app/node_modules
      - /app/.docusaurus
      - /app/build
    ports:
      - "3002:3000"
    networks:
      - synkora-network

