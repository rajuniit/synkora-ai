# Redis for Load Testing - Rate limiting and pub/sub
# Isolated from main platform Redis

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: load-testing
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - "allkeys-lru"
            - --save
            - ""
            - --appendonly
            - "no"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: load-testing
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis

---
# Secrets template
apiVersion: v1
kind: Secret
metadata:
  name: llm-proxy-secrets
  namespace: load-testing
type: Opaque
stringData:
  # Update these with actual values
  database-url: "postgresql://user:pass@postgres.database.svc.cluster.local:5432/synkora"
  redis-url: "redis://redis.load-testing.svc.cluster.local:6379"
