name: Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-2' }}.amazonaws.com
  NAMESPACE: synkora-production

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  secret-scan:
   name: Secret Scan
   runs-on: ubuntu-latest
   steps:
     - name: Checkout code
       uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
       with:
         fetch-depth: 0
     - name: Run Gitleaks
       run: |
         curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
           | tar -xz -C /usr/local/bin gitleaks
         gitleaks detect --source . --config .gitleaks.toml --redact -v
  release:
    name: Create GitHub Release
    needs: secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: release
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo docker system prune -af --volumes
          df -h

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Validate required variables
        run: |
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "ERROR: AWS_ACCOUNT_ID repository variable is not set."
            echo "Go to Settings → Secrets and variables → Actions → Variables and add AWS_ACCOUNT_ID."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Build and push API image
        uses: docker/build-push-action@67a2d409c0a876cbe6b11854e3e25193efe4e62d  # v5.4.0
        with:
          context: ./api
          file: ./api/Dockerfile
          target: production
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/synkora-api:${{ github.ref_name }}
            ${{ env.ECR_REGISTRY }}/synkora-api:latest
          build-args: |
            COMMIT_SHA=${{ github.ref_name }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Install Trivy
        run: |
          curl -sL "https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy

      - name: Scan API image for CVEs (Trivy)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --format table \
            "${{ env.ECR_REGISTRY }}/synkora-api:${{ github.ref_name }}"

      - name: Clean up after API build
        run: |
          docker builder prune -f
          df -h
      
      # TODO: re-enable once GCP account is created
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      #
      # - name: Login to Google Artifact Registry
      #   run: |
      #     gcloud auth configure-docker ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev --quiet
      #
      # - name: Push API image to Google Artifact Registry
      #   run: |
      #     GAR_IMAGE="${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/synkora/api"
      #     docker tag ${{ env.ECR_REGISTRY }}/synkora-api:${{ github.ref_name }} ${GAR_IMAGE}:${{ github.ref_name }}
      #     docker tag ${{ env.ECR_REGISTRY }}/synkora-api:${{ github.ref_name }} ${GAR_IMAGE}:latest
      #     docker push ${GAR_IMAGE}:${{ github.ref_name }}
      #     docker push ${GAR_IMAGE}:latest

      - name: Build and push ML service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/ml
          file: ./services/ml/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/synkora-ml:${{ github.ref_name }}
            ${{ env.ECR_REGISTRY }}/synkora-ml:latest
          cache-from: type=gha,scope=ml
          cache-to: type=gha,mode=max,scope=ml

      - name: Clean up after ML build
        run: |
          docker builder prune -f
          df -h

      - name: Build and push scraper service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/scraper
          file: ./services/scraper/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/synkora-scraper:${{ github.ref_name }}
            ${{ env.ECR_REGISTRY }}/synkora-scraper:latest
          cache-from: type=gha,scope=scraper
          cache-to: type=gha,mode=max,scope=scraper

      - name: Clean up after scraper build
        run: |
          docker builder prune -f
          df -h

      - name: Build and push sandbox service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/sandbox
          file: ./services/sandbox/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/synkora-sandbox:${{ github.ref_name }}
            ${{ env.ECR_REGISTRY }}/synkora-sandbox:latest
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

      - name: Clean up after sandbox build
        run: |
          docker builder prune -f
          df -h

      - name: Build and push Frontend image
        uses: docker/build-push-action@67a2d409c0a876cbe6b11854e3e25193efe4e62d  # v5.4.0
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/synkora-frontend:${{ github.ref_name }}
            ${{ env.ECR_REGISTRY }}/synkora-frontend:latest
          build-args: |
            COMMIT_SHA=${{ github.ref_name }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_HOST=${{ vars.NEXT_PUBLIC_SENTRY_HOST }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to DOKS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl for DOKS
        run: |
          doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/base/namespace.yaml

      - name: Install KEDA
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm upgrade --install keda kedacore/keda \
            --namespace keda \
            --create-namespace \
            --atomic \
            --timeout 3m
          # Wait for KEDA's aggregated API server to be ready before applying manifests,
          # otherwise kubectl discovery hits EOF on keda.sh API group
          kubectl rollout status deployment/keda-operator -n keda --timeout=120s
          kubectl rollout status deployment/keda-operator-metrics-apiserver -n keda --timeout=120s

      - name: Configure AWS credentials (for ECR secret)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECR pull secret
        run: |
          kubectl delete secret ecr-registry-secret -n ${{ env.NAMESPACE }} --ignore-not-found=true
          ECR_PASSWORD="$(aws ecr get-login-password --region ${{ env.AWS_REGION }})"
          kubectl create secret docker-registry ecr-registry-secret \
            --docker-server=${{ env.ECR_REGISTRY }} \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --namespace=${{ env.NAMESPACE }}

      - name: Inject application secrets into cluster
        run: |
          kubectl create secret generic synkora-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=ML_SERVICE_URL="${{ vars.K8S_ML_SERVICE_URL }}" \
            --from-literal=SCRAPER_SERVICE_URL="${{ vars.K8S_SCRAPER_SERVICE_URL }}" \
            --from-literal=SANDBOX_SERVICE_URL="${{ vars.K8S_SANDBOX_SERVICE_URL }}" \
            --from-literal=SANDBOX_API_KEY="${{ secrets.K8S_SANDBOX_API_KEY }}" \
            --from-literal=SECRET_KEY="${{ secrets.K8S_SECRET_KEY }}" \
            --from-literal=JWT_SECRET_KEY="${{ secrets.K8S_JWT_SECRET_KEY }}" \
            --from-literal=ENCRYPTION_KEY="${{ secrets.K8S_ENCRYPTION_KEY }}" \
            --from-literal=JWT_ACCESS_TOKEN_EXPIRES="${{ secrets.K8S_JWT_ACCESS_TOKEN_EXPIRES }}" \
            --from-literal=JWT_REFRESH_TOKEN_EXPIRES="${{ secrets.K8S_JWT_REFRESH_TOKEN_EXPIRES }}" \
            --from-literal=JWT_ALGORITHM="${{ secrets.K8S_JWT_ALGORITHM }}" \
            --from-literal=DB_HOST="${{ secrets.K8S_DB_HOST }}" \
            --from-literal=DB_USERNAME="${{ secrets.K8S_DB_USERNAME }}" \
            --from-literal=DB_DATABASE="${{ secrets.K8S_DB_DATABASE }}" \
            --from-literal=DB_CHARSET="" \
            --from-literal=DB_EXTRAS="" \
            --from-literal=DB_PASSWORD="${{ secrets.K8S_DB_PASSWORD }}" \
            --from-literal=SQLALCHEMY_DATABASE_URI_SCHEME="${{ secrets.K8S_SQLALCHEMY_DATABASE_URI_SCHEME }}" \
            --from-literal=SQLALCHEMY_POOL_SIZE="${{ secrets.K8S_SQLALCHEMY_POOL_SIZE }}" \
            --from-literal=SQLALCHEMY_MAX_OVERFLOW="${{ secrets.K8S_SQLALCHEMY_MAX_OVERFLOW }}" \
            --from-literal=SQLALCHEMY_POOL_RECYCLE="${{ secrets.K8S_SQLALCHEMY_POOL_RECYCLE }}" \
            --from-literal=SQLALCHEMY_POOL_USE_LIFO="${{ secrets.K8S_SQLALCHEMY_POOL_USE_LIFO }}" \
            --from-literal=SQLALCHEMY_POOL_PRE_PING="${{ secrets.K8S_SQLALCHEMY_POOL_PRE_PING }}" \
            --from-literal=SQLALCHEMY_ECHO="${{ secrets.K8S_SQLALCHEMY_ECHO }}" \
            --from-literal=SQLALCHEMY_POOL_TIMEOUT="${{ secrets.K8S_SQLALCHEMY_POOL_TIMEOUT }}" \
            --from-literal=REDIS_URL="${{ secrets.K8S_REDIS_URL }}" \
            --from-literal=REDIS_MAX_CONNECTIONS="${{ secrets.K8S_REDIS_MAX_CONNECTIONS }}" \
            --from-literal=CELERY_BROKER_URL="${{ secrets.K8S_CELERY_BROKER_URL }}" \
            --from-literal=CELERY_RESULT_BACKEND="${{ secrets.K8S_CELERY_RESULT_BACKEND }}" \
            --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --from-literal=PINECONE_API_KEY="${{ secrets.K8S_PINECONE_API_KEY }}" \
            --from-literal=LANGFUSE_HOST="${{ secrets.K8S_LANGFUSE_HOST }}" \
            --from-literal=LANGFUSE_PUBLIC_KEY="${{ secrets.K8S_LANGFUSE_PUBLIC_KEY }}" \
            --from-literal=LANGFUSE_SECRET_KEY="${{ secrets.K8S_LANGFUSE_SECRET_KEY }}" \
            --from-literal=SMTP_PASSWORD="${{ secrets.K8S_SMTP_PASSWORD }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.K8S_OPENAI_API_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.K8S_ANTHROPIC_API_KEY }}" \
            --from-literal=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --from-literal=SENTRY_ENVIRONMENT="${{ vars.SENTRY_ENVIRONMENT }}" \
            --from-literal=CORS_ORIGINS="${{ secrets.K8S_CORS_ORIGINS }}" \
            --from-literal=METRICS_AUTH_TOKEN="${{ secrets.K8S_METRICS_AUTH_TOKEN }}" \
            --from-literal=GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
            --from-literal=GCP_REGION="${{ vars.GCP_REGION || 'us-central1' }}" \
            --from-literal=GCP_SERVICE_ACCOUNT_JSON="${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}" \
            --from-literal=CLOUD_RUN_JOB_NAME="${{ secrets.K8S_CLOUD_RUN_JOB_NAME }}" \
            --from-literal=CLOUD_RUN_INVOCATION_SECRET="${{ secrets.K8S_CLOUD_RUN_INVOCATION_SECRET }}" \
            --from-literal=AUDIT_CHAIN_SECRET="${{ secrets.K8S_AUDIT_CHAIN_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -
     
      # TODO: re-enable once GCP account is created
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      #
      # - name: Update Cloud Run Job with new image
      #   run: |
      #     GAR_IMAGE="${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/synkora/api:${{ github.ref_name }}"
      #     gcloud run jobs update ${{ secrets.K8S_CLOUD_RUN_JOB_NAME }} \
      #       --image="${GAR_IMAGE}" \
      #       --region="${{ vars.GCP_REGION || 'us-central1' }}" \
      #       --project="${{ secrets.GCP_PROJECT_ID }}"


      - name: Apply deployment manifests
        run: |
          IMAGE_TAG="${{ github.ref_name }}"
          # Replace IMAGE_PLACEHOLDER with actual image tags before applying
          find k8s/application -name "*.yml" -o -name "*.yaml" | xargs sed -i \
            "s|IMAGE_PLACEHOLDER|${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG}|g"

          # Server-side apply: sends a single PATCH per resource (no GET first), halving
          # API calls and avoiding the DO control-plane rate limit that causes EOF failures.
          kubectl apply --server-side --force-conflicts \
            -f k8s/application/synkora-config.yml \
            -f k8s/application/synkora-api-serviceaccount.yml \
            -f k8s/application/api-service.yml \
            -f k8s/application/synkora-ingress.yml \
            -f k8s/application/synkora-frontend-service.yml \
            -f k8s/application/synkora-frontend-ingress.yml \
            -f k8s/application/ml-service-deployment.yaml \
            -f k8s/application/scraper-service-deployment.yaml \
            -f k8s/application/sandbox-service-deployment.yaml \
            -f k8s/application/api-deployment.yml \
            -f k8s/application/api-hpa.yml \
            -f k8s/application/celery-worker-deployment.yml \
            -f k8s/application/celery-worker-agents-deployment.yml \
            -f k8s/application/celery-worker-agents-keda.yml \
            -f k8s/application/celery-worker-billing-deployment.yml \
            -f k8s/application/celery-worker-notifications-deployment.yml \
            -f k8s/application/celery-beat-deployment.yml \
            -f k8s/application/bot-worker-deployment.yaml \
            -f k8s/application/synkora-frontend-deployment.yml \
            -f k8s/application/flower-deployment.yml \
            -f k8s/application/flower-ingress.yml

      - name: Run database migrations
        run: |
          IMAGE_TAG="${{ github.ref_name }}"
          POD_NAME="alembic-migrate-$(echo ${IMAGE_TAG} | tr '.' '-')"
          kubectl delete pod "${POD_NAME}" -n ${{ env.NAMESPACE }} --ignore-not-found=true

          # Migrations connect directly to DigitalOcean Managed PostgreSQL.
          # DB_HOST is in synkora-secrets; DB_PORT comes from synkora-config (ConfigMap).
          kubectl run "${POD_NAME}" \
            --image=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} \
            --restart=Never \
            --namespace=${{ env.NAMESPACE }} \
            --overrides='{"spec":{"imagePullSecrets":[{"name":"ecr-registry-secret"}],"containers":[{"name":"migrate","image":"${{ env.ECR_REGISTRY }}/synkora-api:'"${IMAGE_TAG}"'","command":["alembic","upgrade","head"],"envFrom":[{"configMapRef":{"name":"synkora-config"}},{"secretRef":{"name":"synkora-secrets"}}]}]}}'

          echo "Waiting for migration pod to start running (image pull + init)..."
          # Wait up to 3 minutes for the pod to actually start running
          kubectl wait pod/"${POD_NAME}" \
            --for=condition=Initialized \
            --timeout=180s \
            -n ${{ env.NAMESPACE }} || {
              echo "--- Pod describe (for debugging) ---"
              kubectl describe pod "${POD_NAME}" -n ${{ env.NAMESPACE }} || true
              kubectl delete pod "${POD_NAME}" -n ${{ env.NAMESPACE }} --ignore-not-found=true
              echo "Migration pod failed to start. Check image pull and secret config above."
              exit 1
            }

          echo "Waiting for migration to complete (up to 5 minutes)..."
          kubectl wait pod/"${POD_NAME}" \
            --for=jsonpath='{.status.phase}'=Succeeded \
            --timeout=300s \
            -n ${{ env.NAMESPACE }} || {
              # Pod didn't succeed — print logs and describe before failing
              echo "--- Migration logs ---"
              kubectl logs "${POD_NAME}" -n ${{ env.NAMESPACE }} || true
              echo "--- Pod describe ---"
              kubectl describe pod "${POD_NAME}" -n ${{ env.NAMESPACE }} || true
              kubectl delete pod "${POD_NAME}" -n ${{ env.NAMESPACE }} --ignore-not-found=true
              echo "Migration timed out or failed."
              exit 1
            }

          echo "--- Migration logs ---"
          kubectl logs "${POD_NAME}" -n ${{ env.NAMESPACE }} || true

          EXIT_CODE=$(kubectl get pod "${POD_NAME}" -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.containerStatuses[0].state.terminated.exitCode}')
          kubectl delete pod "${POD_NAME}" -n ${{ env.NAMESPACE }} --ignore-not-found=true

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed with exit code ${EXIT_CODE}."
            exit 1
          fi
          echo "Migration completed successfully."

      - name: Deploy ML, scraper and sandbox services
        run: |
          IMAGE_TAG="${{ github.ref_name }}"
          kubectl set image deployment/synkora-ml ml=${{ env.ECR_REGISTRY }}/synkora-ml:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-scraper scraper=${{ env.ECR_REGISTRY }}/synkora-scraper:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-sandbox sandbox=${{ env.ECR_REGISTRY }}/synkora-sandbox:${IMAGE_TAG} -n ${{ env.NAMESPACE }}

      - name: Wait for ML, scraper and sandbox rollouts
        run: |
          if ! kubectl rollout status deployment/synkora-ml -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "ML service deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-ml -n ${{ env.NAMESPACE }}
            exit 1
          fi
          if ! kubectl rollout status deployment/synkora-scraper -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Scraper service deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-scraper -n ${{ env.NAMESPACE }}
            exit 1
          fi
          if ! kubectl rollout status deployment/synkora-sandbox -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Sandbox service deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-sandbox -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Deploy API
        run: |
          IMAGE_TAG="${{ github.ref_name }}"
          kubectl set image deployment/synkora-api api=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-celery-worker celery-worker=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-celery-worker-agents celery-worker-agents=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-celery-worker-billing celery-worker-billing=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-celery-worker-notifications celery-worker-notifications=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-celery-beat celery-beat=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-bot-worker bot-worker=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/synkora-flower flower=${{ env.ECR_REGISTRY }}/synkora-api:${IMAGE_TAG} -n ${{ env.NAMESPACE }}

      - name: Deploy Frontend
        run: |
          IMAGE_TAG="${{ github.ref_name }}"
          kubectl set image deployment/synkora-frontend frontend=${{ env.ECR_REGISTRY }}/synkora-frontend:${IMAGE_TAG} -n ${{ env.NAMESPACE }}

      - name: Wait for API rollout
        run: |
          if ! kubectl rollout status deployment/synkora-api -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "API deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-api -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Wait for Celery worker rollout
        run: |
          if ! kubectl rollout status deployment/synkora-celery-worker -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Celery worker deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-celery-worker -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Wait for Celery agents worker rollout
        run: |
          if ! kubectl rollout status deployment/synkora-celery-worker-agents -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Celery agents worker deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-celery-worker-agents -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Wait for Celery billing worker rollout
        run: |
          if ! kubectl rollout status deployment/synkora-celery-worker-billing -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Celery billing worker deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-celery-worker-billing -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Wait for Celery notifications worker rollout
        run: |
          if ! kubectl rollout status deployment/synkora-celery-worker-notifications -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Celery notifications worker deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-celery-worker-notifications -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Wait for Celery beat rollout
        run: |
          if ! kubectl rollout status deployment/synkora-celery-beat -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Celery beat deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-celery-beat -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Wait for Bot worker rollout
        run: |
          if ! kubectl rollout status deployment/synkora-bot-worker -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Bot worker deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-bot-worker -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Wait for Frontend rollout
        run: |
          if ! kubectl rollout status deployment/synkora-frontend -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Frontend deployment failed, rolling back..."
            kubectl rollout undo deployment/synkora-frontend -n ${{ env.NAMESPACE }}
            exit 1
          fi

      - name: Health check
        run: |
          echo "Waiting 30s for services to stabilize..."
          sleep 30
          echo "Checking API health endpoint..."
          # Use kubectl port-forward to check health internally
          kubectl run health-check --rm -i --restart=Never --image=curlimages/curl:latest -n ${{ env.NAMESPACE }} -- \
            curl -sf --max-time 10 "http://synkora-api.${{ env.NAMESPACE }}.svc.cluster.local:5001/api/health" || {
            echo "Health check failed! Rolling back all deployments..."
            kubectl rollout undo deployment/synkora-api -n ${{ env.NAMESPACE }}
            kubectl rollout undo deployment/synkora-celery-worker -n ${{ env.NAMESPACE }}
            kubectl rollout undo deployment/synkora-celery-worker-agents -n ${{ env.NAMESPACE }}
            kubectl rollout undo deployment/synkora-celery-worker-billing -n ${{ env.NAMESPACE }}
            kubectl rollout undo deployment/synkora-celery-worker-notifications -n ${{ env.NAMESPACE }}
            kubectl rollout undo deployment/synkora-celery-beat -n ${{ env.NAMESPACE }}
            kubectl rollout undo deployment/synkora-bot-worker -n ${{ env.NAMESPACE }}
            kubectl rollout undo deployment/synkora-frontend -n ${{ env.NAMESPACE }}
            exit 1
          }
          echo "Health check passed!"

      - name: Deployment summary
        if: success()
        run: |
          echo "=== Deployment Summary ==="
          echo "Image tag: ${{ github.ref_name }}"
          echo "Namespace: ${{ env.NAMESPACE }}"
          echo ""
          kubectl get deployments -n ${{ env.NAMESPACE }}
          echo ""
          kubectl get pods -n ${{ env.NAMESPACE }}
