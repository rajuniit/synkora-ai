name: Refresh ECR Pull Secret

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-2' }}.amazonaws.com
  NAMESPACE: synkora-production

jobs:
  refresh:
    name: Refresh ECR secret & restart celery worker
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}

      - name: Refresh ECR pull secret
        run: |
          kubectl delete secret ecr-registry-secret -n ${{ env.NAMESPACE }} --ignore-not-found=true
          ECR_PASSWORD="$(aws ecr get-login-password --region ${{ env.AWS_REGION }})"
          kubectl create secret docker-registry ecr-registry-secret \
            --docker-server=${{ env.ECR_REGISTRY }} \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --namespace=${{ env.NAMESPACE }}
          echo "ECR secret refreshed successfully"

      - name: Restart celery worker
        run: |
          kubectl rollout restart deployment/synkora-celery-worker -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/synkora-celery-worker -n ${{ env.NAMESPACE }} --timeout=300s
          echo "Celery worker restarted successfully"

      - name: Show pod status
        run: kubectl get pods -n ${{ env.NAMESPACE }}
