name: Database Migration Test

on:
  workflow_call:

concurrency:
  group: db-migration-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: DB Migration Test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: api

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: synkora_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/synkora_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: test-secret-key-for-ci
      JWT_SECRET_KEY: test-jwt-secret-for-ci
      ENCRYPTION_KEY: h4TKsK-67AUs1F54Rw5TbbEisyDbVfkOuMZk_q2G6Iw=

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: synkora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libxmlsec1-dev libxmlsec1-openssl pkg-config libxml2-dev libxslt1-dev

      - name: Install dependencies
        run: |
          uv sync --extra dev
          uv pip install --force-reinstall --no-binary lxml lxml

      - name: Run migrations
        run: |
          uv run alembic upgrade head

      - name: Verify migrations
        run: |
          uv run python -c "
          from sqlalchemy import create_engine, inspect
          import os

          engine = create_engine(os.environ['DATABASE_URL'])
          inspector = inspect(engine)
          tables = inspector.get_table_names()

          required_tables = ['accounts', 'tenants', 'apps', 'conversations', 'messages', 'datasets', 'documents', 'document_segments']

          for table in required_tables:
              if table not in tables:
                  raise Exception(f'Required table {table} not found')

          print('All required tables exist')
          "

      - name: Test migration rollback
        run: |
          uv run alembic downgrade cc30e80dc089
          uv run alembic upgrade head
