name: Main CI Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

concurrency:
  group: main-ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Scan for leaked secrets before running any tests
  secret-scan:
   name: Secret Scanning (Gitleaks)
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
       with:
         fetch-depth: 0  # Full history so gitleaks can scan all commits in the PR
     - name: Run Gitleaks
       run: |
         curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
           | tar -xz -C /usr/local/bin gitleaks
         gitleaks detect --source . --config .gitleaks.toml --redact -v

  # Check which paths were changed to determine which tests to run
  check-changes:
    name: Check Changed Files
    runs-on: ubuntu-latest
    outputs:
      api-changed: ${{ steps.changes.outputs.api }}
      web-changed: ${{ steps.changes.outputs.web }}
      migration-changed: ${{ steps.changes.outputs.migration }}
      docker-changed: ${{ steps.changes.outputs.docker }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'api/**'
              - 'docker-compose.yml'
              - '.github/workflows/api-tests.yml'
            web:
              - 'web/**'
              - '.github/workflows/web-tests.yml'
            migration:
              - 'api/migrations/**'
              - '.github/workflows/db-migration-test.yml'
            docker:
              - 'docker-compose.yml'
              - 'api/Dockerfile'
              - 'web/Dockerfile'
              - 'services/ml/**'
              - 'services/scraper/**'
              - '.github/workflows/docker-build.yml'

  style-check:
    name: Style Check
    uses: ./.github/workflows/style.yml

  # Run tests in parallel — only after style check passes
  api-tests:
    name: API Tests
    needs: [check-changes, style-check]
    if: needs.check-changes.outputs.api-changed == 'true'
    uses: ./.github/workflows/api-tests.yml

  web-tests:
    name: Web Tests
    needs: [check-changes, style-check]
    if: needs.check-changes.outputs.web-changed == 'true'
    uses: ./.github/workflows/web-tests.yml

  db-migration-test:
    name: DB Migration Test
    needs: [check-changes, style-check]
    if: needs.check-changes.outputs.migration-changed == 'true'
    uses: ./.github/workflows/db-migration-test.yml

  docker-build:
    name: Docker Build Test
    needs: [check-changes, style-check]
    if: needs.check-changes.outputs.docker-changed == 'true'
    uses: ./.github/workflows/docker-build.yml
  
  dependency-scan:
   name: Dependency Vulnerability Scan (SCA)
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2


     - name: Set up Python
       uses: actions/setup-python@v5
       with:
         python-version: "3.11"


     - name: Install uv and pip-audit
       run: pip install uv pip-audit


     - name: Export pinned requirements from pyproject.toml
       working-directory: api
       run: uv export --no-hashes --no-emit-project --format requirements-txt -o /tmp/requirements-audit.txt


     - name: Scan Python dependencies (pip-audit)
       run: |
         pip-audit \
           --requirement /tmp/requirements-audit.txt \
           --ignore-vuln CVE-2025-69872 \
           --ignore-vuln CVE-2026-41066 \
           --ignore-vuln CVE-2026-35029 \
           --ignore-vuln CVE-2026-35030 \
           --ignore-vuln GHSA-69x8-hrgq-fjj8 \
           --ignore-vuln CVE-2026-27448 \
           --ignore-vuln CVE-2026-27459 \
           --ignore-vuln CVE-2026-26007 \
           --ignore-vuln CVE-2026-34073 \
           --ignore-vuln CVE-2026-39892 \
           --ignore-vuln CVE-2025-69277 \
           --format markdown \
           --output api/pip-audit-report.md
       continue-on-error: false


     - name: Set up Node.js
       uses: actions/setup-node@v4
       with:
         node-version: "20"


     - name: Install pnpm
       uses: pnpm/action-setup@v4
       with:
         version: 9


     - name: Scan frontend dependencies (pnpm audit)
       working-directory: web
       run: |
         # pnpm@9 has no --ignore-advisory flag; ignoreCves in package.json handles CVE-based ones.
         # GHSA-q4gf-8mx6-v5v3: next@16.x DoS pulled in by @sentry/nextjs — no CVE ID, filter via JSON.
         pnpm audit --json 2>/dev/null > /tmp/pnpm-audit.json; true
         node -e "
           const d = JSON.parse(require('fs').readFileSync('/tmp/pnpm-audit.json', 'utf8'));
           const skip = new Set(['GHSA-q4gf-8mx6-v5v3']);
           const highs = Object.values(d.advisories || {})
             .filter(a => ['high','critical'].includes(a.severity) && !skip.has(a.github_advisory_id));
           if (highs.length) {
             highs.forEach(a => console.error('HIGH:', a.github_advisory_id, a.module_name, a.patched_versions));
             process.exit(1);
           }
           console.log('No unacknowledged high/critical vulnerabilities.');
         "


     - name: Upload pip-audit report
       if: always()
       uses: actions/upload-artifact@v4
       with:
         name: pip-audit-report
         path: api/pip-audit-report.md
         retention-days: 30






