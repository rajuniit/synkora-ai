apiVersion: apps/v1
kind: Deployment
metadata:
  name: synkora-frontend
  namespace: synkora-production
  labels:
    app: synkora
    component: frontend
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: synkora
      component: frontend
  template:
    metadata:
      labels:
        app: synkora
        component: frontend
        version: v1
    spec:
      imagePullSecrets:
      - name: ecr-registry-secret
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: frontend
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Next.js needs write access to .next/cache
          capabilities:
            drop: ["ALL"]
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: EDITION
          value: "SELF_HOSTED"
        - name: DEPLOY_ENV
          value: "PRODUCTION"
        - name: PORT
          value: "3000"
        - name: NEXT_TELEMETRY_DISABLED
          value: "1"
        - name: NEXT_PUBLIC_LOGS_URL
          value: "https://logs.synkora.ai"
        - name: NEXT_PUBLIC_COMING_SOON
          value: "true"
        - name: PM2_INSTANCES
          value: "2"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5
