apiVersion: apps/v1
kind: Deployment
metadata:
  name: synkora-celery-worker-notifications
  namespace: synkora-production
  labels:
    app: synkora
    component: celery-worker-notifications
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: synkora
      component: celery-worker-notifications
  template:
    metadata:
      labels:
        app: synkora
        component: celery-worker-notifications
        version: v1
    spec:
      imagePullSecrets:
      - name: ecr-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: celery-worker-notifications
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: Always
        command: ["celery"]
        # Handles: email sending, in-app notifications, Slack/Teams/WhatsApp notifications.
        # Tasks are I/O-bound and short-lived — high concurrency, low memory.
        args: ["-A", "src.celery_app", "worker", "--loglevel=info", "-Q", "email,notifications",
               "--concurrency=8"]
        envFrom:
        - configMapRef:
            name: synkora-config
        - secretRef:
            name: synkora-secrets
        resources:
          requests:
            # I/O-bound tasks (SMTP, HTTP) — minimal CPU/memory needed.
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 2Gi
      terminationGracePeriodSeconds: 60
