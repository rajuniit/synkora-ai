# SUPERSEDED — this single-node Redis deployment has been replaced by Redis Sentinel (HA).
# Deploy the Sentinel cluster first using redis-sentinel-values.yml, verify connectivity,
# then remove this file and run:
#   kubectl delete deployment synkora-redis -n synkora-production
#   kubectl delete service synkora-redis -n synkora-production
#   kubectl delete pvc synkora-redis-data -n synkora-production
#
# The application code (api/src/config/redis.py) switches to Sentinel mode automatically
# when REDIS_SENTINEL_HOSTS is set in synkora-config.yml.

---
# Redis PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synkora-redis-data
  namespace: synkora-production
  labels:
    app: synkora
    component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synkora-redis
  namespace: synkora-production
  labels:
    app: synkora
    component: redis
    version: v1
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: synkora
      component: redis
  template:
    metadata:
      labels:
        app: synkora
        component: redis
        version: v1
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: synkora-redis-data

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: synkora-redis
  namespace: synkora-production
  labels:
    app: synkora
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: synkora
    component: redis
