apiVersion: v1
kind: ConfigMap
metadata:
  name: synkora-config
  namespace: synkora-production
data:
  APP_ENV: "production"

  # Database — point all pods at PgBouncer, not PostgreSQL directly.
  # PgBouncer (pool_mode=transaction) multiplexes thousands of app connections
  # down to 25 real PostgreSQL connections, keeping Postgres under max_connections=100.
  DB_HOST: "synkora-pgbouncer"
  DB_PORT: "5432"
  # Tells api/src/core/database.py to disable asyncpg prepared statements,
  # which are incompatible with PgBouncer transaction-mode pooling.
  PGBOUNCER_ENABLED: "true"

  # Redis — Sentinel mode for HA (replaces the single-node redis-deployment.yml).
  # The application code (api/src/config/redis.py:82-109) handles Sentinel automatically
  # when REDIS_SENTINEL_HOSTS is set. No URL needed.
  # Headless service DNS from Bitnami chart: <release>-redis-headless.<namespace>.svc.cluster.local
  REDIS_SENTINEL_HOSTS: "synkora-redis-headless:26379"
  REDIS_MASTER_NAME: "mymaster"
  SERVER_WORKER_AMOUNT: "2"
  APP_DEBUG: "false"
  API_HOST: "0.0.0.0"
  API_PORT: "5001"
  # REQUIRED: set to your deployment domain before applying.
  APP_BASE_URL: "https://synkora.ai"

  INNER_CORS_ORIGINS: "https://synkora.ai"

  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"

  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  MAX_UPLOAD_SIZE: "15728640"
  INNER_ALLOWED_EXTENSIONS: "txt,pdf,docx,md,html"

  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "synkora-ai-01"
  AWS_ENDPOINT_URL: "https://s3.us-east-1.amazonaws.com"

  STORAGE_TYPE: "s3"
  S3_BUCKET: "synkora-ai-01"
  S3_REGION: "us-east-1"
  S3_ENDPOINT: "https://s3.us-east-1.amazonaws.com"

  VECTOR_STORE: "PINECONE"
  PINECONE_ENVIRONMENT: "us-east-1"
  PINECONE_CLOUD: "aws"

  LANGFUSE_ENABLED: "true"
  LANGFUSE_SAMPLE_RATE: "1.0"

  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@synkora.ai"
  # REQUIRED: set to your deployment domain before applying.
  FROM_EMAIL: "noreply@synkora.ai"

  # Domain & URL Settings — REQUIRED: replace with your deployment domain.
  PLATFORM_DOMAIN: "synkora.ai"
  WEBHOOK_BASE_URL: "https://api.synkora.ai"
  WIDGET_JS_URL: "https://synkora.ai/widget.js"
  PUBLIC_API_URL: "https://api.synkora.ai/api/v1"

  # Workspace Settings (Agent Sandbox)
  WORKSPACE_BASE_PATH: "/tmp/synkora/workspaces"
  WORKSPACE_TTL_HOURS: "24"
  WORKSPACE_MAX_SIZE_MB: "2000"
  WORKSPACE_MAX_PER_TENANT: "100"
