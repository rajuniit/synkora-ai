apiVersion: v1
kind: ConfigMap
metadata:
  name: synkora-config
  namespace: synkora-production
data:
  APP_ENV: "production"

  # Database — DigitalOcean Managed PostgreSQL (NYC1, same region as cluster).
  # Direct connection, no PgBouncer. Host/credentials are injected via synkora-secrets.
  DB_PORT: "25060"
  PGBOUNCER_ENABLED: "false"

  # Redis — in-cluster (no TLS, private network).
  # REDIS_URL is set in synkora-secrets.
  ALLOW_INSECURE_REDIS: "true"
  SERVER_WORKER_AMOUNT: "2"
  APP_DEBUG: "false"
  API_HOST: "0.0.0.0"
  API_PORT: "5001"
  # REQUIRED: set to your deployment domain before applying.
  APP_BASE_URL: "https://synkora.ai"

  INNER_CORS_ORIGINS: "https://synkora.ai"

  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"

  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  MAX_UPLOAD_SIZE: "15728640"
  INNER_ALLOWED_EXTENSIONS: "txt,pdf,docx,md,html"

  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "synkora-ai-01"
  AWS_ENDPOINT_URL: "https://s3.us-east-1.amazonaws.com"

  STORAGE_TYPE: "s3"
  S3_BUCKET: "synkora-ai-01"
  S3_REGION: "us-east-1"
  S3_ENDPOINT: "https://s3.us-east-1.amazonaws.com"

  VECTOR_STORE: "PINECONE"
  PINECONE_ENVIRONMENT: "us-east-1"
  PINECONE_CLOUD: "aws"

  LANGFUSE_ENABLED: "false"
  LANGFUSE_SAMPLE_RATE: "1.0"

  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@synkora.ai"
  # REQUIRED: set to your deployment domain before applying.
  FROM_EMAIL: "noreply@synkora.ai"

  # Domain & URL Settings — REQUIRED: replace with your deployment domain.
  PLATFORM_DOMAIN: "synkora.ai"
  WEBHOOK_BASE_URL: "https://api.synkora.ai"
  WIDGET_JS_URL: "https://synkora.ai/widget.js"
  PUBLIC_API_URL: "https://api.synkora.ai/api/v1"

  # Workspace Settings (Agent Sandbox)
  WORKSPACE_BASE_PATH: "/tmp/synkora/workspaces"
  WORKSPACE_TTL_HOURS: "24"
  WORKSPACE_MAX_SIZE_MB: "2000"
  WORKSPACE_MAX_PER_TENANT: "100"

  # Session & Auth Security
  # Maximum total session lifetime regardless of activity — forces re-login after this period.
  JWT_MAX_SESSION_AGE_HOURS: "12"
  # Days of inactivity before account is automatically disabled (PCI-DSS 8.1.4: 90 days)
  DORMANT_ACCOUNT_DAYS: "90"
  # Check new passwords against HaveIBeenPwned breach database (k-anonymity, no key needed)
  HIBP_CHECK_ENABLED: "true"

  # LLM / Agent Security
  # Hard ceiling on max_tokens per LLM response — prevents token-padding / data exfiltration
  PLATFORM_MAX_TOKENS_PER_RESPONSE: "32000"
  # Comma-separated domain blocklist for agent web-fetch tool
  AGENT_BLOCKED_DOMAINS: ""
  # Hide real model name and provider from cross-tenant public agent responses
  HIDE_MODEL_INFO_IN_PUBLIC: "false"

  # Audit & Compliance — Retention Policies
  # SOC 2 and PCI DSS require minimum 1 year (365 days) audit log retention
  AUDIT_LOG_RETENTION_DAYS: "365"
  CONVERSATION_RETENTION_DAYS: "365"
  MESSAGE_RETENTION_DAYS: "365"
  # Files can have a shorter retention window
  FILE_RETENTION_DAYS: "90"
