apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synkora-ingress
  namespace: synkora-production
  annotations:
    # This annotation is crucial if your app expects requests at root "/"
    # but you expose it at "/api". It strips "/api" before sending to the pod.
    # If your app handles "/api" internally, remove this line.
    # nginx.ingress.kubernetes.io/rewrite-target: /

    # Increase body size for file uploads if needed
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # SSE (Server-Sent Events) support — prevents nginx from buffering/closing long-lived streams
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    # REQUIRED: replace with your deployment domain before applying.
    - api.synkora.ai
    secretName: synkora-api-tls
  rules:
  - host: api.synkora.ai
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: synkora-api
            port:
              number: 5001
      - path: /console
        pathType: Prefix
        backend:
          service:
            name: synkora-api
            port:
              number: 5001
      - path: /v1
        pathType: Prefix
        backend:
          service:
            name: synkora-api
            port:
              number: 5001
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: synkora-api
            port:
              number: 5001
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: synkora-api
            port:
              number: 5001
      # WebSocket path — distributed via Redis pub/sub (no sticky sessions needed).
      # Nginx must not buffer WebSocket frames; upgrade headers are required.
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: synkora-api
            port:
              number: 5001
