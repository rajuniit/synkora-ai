apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: synkora-api-hpa
  namespace: synkora-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: synkora-api
  minReplicas: 1
  # 7-node cluster (s-2vcpu-4gb). API pod requests 500Mi/500m.
  # Capped at 5 to prevent cluster OOM during rolling updates or crash loops.
  # Raise alongside cluster node count.
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      # Wait 5 minutes of sustained low load before scaling down.
      # Prevents thrashing when traffic is spiky.
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleUp:
      # Scale up immediately on load spikes — no stabilization window.
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
