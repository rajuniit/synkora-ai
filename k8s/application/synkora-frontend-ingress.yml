apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synkora-frontend-ingress
  namespace: synkora-production
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Nginx ingress controller automatically sets X-Forwarded-Host header
    # The application code now checks for this header first
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Enable gzip compression for faster JS/CSS/HTML transfer
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    nginx.ingress.kubernetes.io/gzip-types: "text/plain text/css text/javascript application/javascript application/json image/svg+xml"
    # Next.js already sets Cache-Control: public, max-age=31536000, immutable on
    # /_next/static/ assets natively — no configuration-snippet needed.
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    # REQUIRED: replace with your deployment domain before applying.
    - your-domain.com
    secretName: synkora-frontend-tls
  rules:
  - host: your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: synkora-frontend
            port:
              number: 3000