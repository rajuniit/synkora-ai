---
# PgBouncer Deployment
# Sits between API pods and PostgreSQL, multiplexing thousands of application
# connections down to a small fixed pool of real database connections.
#
# pool_mode=transaction means PgBouncer holds a PostgreSQL connection only for
# the duration of each transaction — ideal for async SQLAlchemy (asyncpg).
#
# Math: 2 replicas × max_client_conn=2000 = 4000 concurrent app connections.
# All 4000 map to ≤35 real PostgreSQL connections (pool=25 + reserve=10).
# PostgreSQL sees constant load regardless of how many API pods are running.
#
# Configuration is driven entirely by environment variables — edoburu/pgbouncer
# auto-generates pgbouncer.ini and userlist.txt from them. No ConfigMap mount
# needed; mounting a custom ini on top of the generated config causes conflicts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synkora-pgbouncer
  namespace: synkora-production
  labels:
    app: synkora
    component: pgbouncer
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: synkora
      component: pgbouncer
  template:
    metadata:
      labels:
        app: synkora
        component: pgbouncer
        version: v1
      annotations:
        prometheus.io/scrape: "false"
    spec:
      imagePullSecrets:
      - name: ecr-registry-secret
      securityContext:
        runAsNonRoot: false  # edoburu runs as root internally; pgbouncer drops privs itself
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        env:
        # --- Listen port ---
        - name: LISTEN_PORT
          value: "5432"

        # --- Backend PostgreSQL connection ---
        # DB_DIRECT_HOST/PORT point directly to RDS — NOT to synkora-pgbouncer.
        # DB_HOST in synkora-secrets is synkora-pgbouncer (for the app); using
        # that here would cause PgBouncer to connect to itself.
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: synkora-secrets
              key: DB_DIRECT_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: synkora-secrets
              key: DB_DIRECT_PORT
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: synkora-secrets
              key: DB_DATABASE
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: synkora-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: synkora-secrets
              key: DB_PASSWORD

        # --- Pool settings ---
        # transaction mode: required for asyncpg / async SQLAlchemy.
        # session or statement mode will break prepared-statement handling.
        - name: POOL_MODE
          value: "transaction"
        - name: MAX_CLIENT_CONN
          value: "2000"
        - name: DEFAULT_POOL_SIZE
          value: "25"
        - name: RESERVE_POOL_SIZE
          value: "10"
        # DISCARD TEMP drops only temporary tables between transactions.
        # DISCARD ALL must NOT be used in transaction mode — it runs RESET ALL
        # which clears statement_timeout (and all other SET parameters) set by
        # SQLAlchemy's receive_connect event listener, silently disabling query
        # timeouts after the first transaction on each server connection.
        - name: SERVER_RESET_QUERY
          value: "DISCARD TEMP"
        # Close idle server connections after 10 minutes to free PostgreSQL slots.
        - name: SERVER_IDLE_TIMEOUT
          value: "600"

        # --- Auth ---
        # scram-sha-256 required for RDS PostgreSQL 14+ (default auth method).
        # md5 will fail with "wrong password type" against modern RDS instances.
        - name: AUTH_TYPE
          value: "scram-sha-256"

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # bitnami writes config + pid files at runtime
          capabilities:
            drop:
              - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - pgbouncer
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
