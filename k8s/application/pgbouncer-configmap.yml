apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: synkora-production
  labels:
    app: synkora
    component: pgbouncer
# This ConfigMap documents the effective PgBouncer configuration.
# The bitnami/pgbouncer image generates pgbouncer.ini + userlist.txt automatically
# from the environment variables defined in pgbouncer-deployment.yml, so this
# ConfigMap is NOT mounted — it serves as the human-readable reference config
# that matches exactly what the bitnami image produces from those env vars.
#
# Equivalent ini (auto-generated by bitnami from env vars):
#
#   [databases]
#   synkora = host=synkora-postgres port=5432 dbname=synkora
#
#   [pgbouncer]
#   listen_addr = 0.0.0.0
#   listen_port = 5432
#   pool_mode = transaction           # PGBOUNCER_POOL_MODE
#   max_client_conn = 2000            # PGBOUNCER_MAX_CLIENT_CONN
#   default_pool_size = 25            # PGBOUNCER_DEFAULT_POOL_SIZE
#   reserve_pool_size = 10            # PGBOUNCER_RESERVE_POOL_SIZE
#   server_reset_query = DISCARD TEMP  # PGBOUNCER_SERVER_RESET_QUERY
#   server_idle_timeout = 600         # PGBOUNCER_SERVER_IDLE_TIMEOUT
#   auth_type = md5                   # PGBOUNCER_AUTH_TYPE
#   auth_file = /opt/bitnami/pgbouncer/conf/userlist.txt  (auto-generated)
#
# To connect to the pgbouncer admin console for inspection:
#   kubectl exec -it <pgbouncer-pod> -- psql -p 5432 -U pgbouncer pgbouncer
#   SHOW POOLS;   SHOW STATS;   SHOW CLIENTS;
data: {}
