apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: synkora-celery-worker-agents-hpa
  namespace: synkora-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: synkora-celery-worker-agents
  minReplicas: 1
  # 30 agent workers × 2 concurrency × 4Gi limit = 240Gi memory ceiling.
  # Scale based on CPU: each agent task (LLM calls, code execution) is CPU-intensive.
  maxReplicas: 30
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      # Agent tasks can run up to 55 minutes (soft limit). Wait longer before
      # scaling down to avoid killing in-progress tasks on pod termination.
      stabilizationWindowSeconds: 600
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
