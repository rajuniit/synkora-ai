apiVersion: v1
kind: Service
metadata:
  name: synkora-frontend
  namespace: synkora-production
  labels:
    app: synkora
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: synkora
    component: frontend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
