[mypy]
python_version = 3.11
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
disallow_untyped_calls = false
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
warn_no_return = false
follow_imports = normal
ignore_missing_imports = true

# Disable specific error codes that are problematic with SQLAlchemy and dynamic code
disable_error_code = abstract, arg-type, assignment, attr-defined, call-arg, call-overload, dict-item, func-returns-value, import-untyped, index, misc, name-defined, no-redef, operator, override, return-value, str-bytes-safe, truthy-function, type-abstract, type-var, union-attr, unused-coroutine, used-before-def, valid-type, var-annotated

[mypy-src.models.*]
disable_error_code = assignment, name-defined, var-annotated, return-value

[mypy-src.services.*]
disable_error_code = arg-type, call-overload

[mypy-src.config.*]
disable_error_code = call-arg

[mypy-src.core.*]
disable_error_code = dict-item, arg-type
